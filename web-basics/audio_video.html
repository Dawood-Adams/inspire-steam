    <title>Module03: Audio Video</title>
</head>
<body>
    <div>
        <!--
        controls- Allow the user to play, pause,
        src- path to the file    
        -->

        <audio src="./assets/audio/Mereba - Sandstorm ft. JID [KHqsrAPgjO0].mp3" controls>

        </audio>

    <div>
        <h3>Watch along</h3>
        <video src="./assets/video/Friends Again by Leon Thomas.mp4" controls></video>
    </div>    
</body>
</html>
