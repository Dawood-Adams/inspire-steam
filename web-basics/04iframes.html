<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module04: iframes</title>

</head>
<body>
    <!--
    embed anither websites content
    within your website
    
    Attributes:
    src- link to the resource online
    width, height- size of windows(pixels)
    title- people with screen readers etc
    allow full screen- let the user go full screen
    -->
    <iframe
    width="560"
    height="315" 
    src="https://www.youtube.com/embed/al8eztwE_pQ?si=lCnxpB6cErLfPUNw" 
    title="YouTube video player" 
    frameborder="0" 
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
    referrerpolicy="strict-origin-when-cross-origin" 
    allowfullscreen>
    </iframe>

    <iframe 
    width="560" height="315" src="https://www.youtube.com/embed/1sZqre0mXTo?si=aSZptiYg-UWmpoTX" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
