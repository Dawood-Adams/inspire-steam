<html>
    <head>
        <title>Module01: h1, h2, p, em, div</title>
        
    </head>

    <body>
        <h1>Music Band</h1>
        <hr>

        <h2>About the band</h2>

        <div>
            <!--em(emphasis) b (bold)-->
            <p>Rediscovering Music, <em>One album at a time</em></p>
            <p>Est <b>2026</b></p>

            <!--small (small text) and i (italics)-->
            <p><small><i>Find our Merch at merch.ebay.com</i></small></p>
            <hr>
        </div>

        <div>
            <!--sub (subscript), sup (superscript), li-->
            <h3>Discover</h3>
            <li>H<sub>2</sub>O</li>
            <li>E is MC<sup>2</sup></li>
            <h4>H<sub>2</sub>O</h4>
           <i>
              We may not know, which way to go, <br>
              all of these souls, are unsavable. 

           </i>
        </div>
    </body>
</html>
