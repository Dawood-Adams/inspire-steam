<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module05: classes, ids</title>
</head>
<body>
    <!--
        id: unique, only one element in a page should have it
        class: reusable, used to identify multiple elements together
    -->
    <div id="page-wrapper">
        <h1>Earthgang</h1>
        <p>Disc: Band from the suburbs of East Atlanta, revolutionizing Hiphop in America</p>

        <img class="band-photos" src="./assets/images/Earthgang.jpg" alt="band-photo">
        <img class="band-photos" src="./assets/images/Earthgang.jpg2.jpg" alt="band-photo">
    </div>
    <div id="favourite">
        <h1>JIDxMereba</h1>
        <p>Amazing love song from two great artists :JID and Mereba</p>

        <audio class="Song sample" src="./assets/audio/Mereba - Sandstorm ft. JID [KHqsrAPgjO0].mp3" controls></audio>

    </div>
</body>
</html>
